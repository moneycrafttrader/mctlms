name: E2E — Recordings

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-recordings.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'tests/e2e/**'
  workflow_dispatch:

env:
  CI: true
  API_URL: http://localhost:3001
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
  E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
  E2E_STUDENT_A_EMAIL: ${{ secrets.E2E_STUDENT_A_EMAIL }}
  E2E_STUDENT_A_PASSWORD: ${{ secrets.E2E_STUDENT_A_PASSWORD }}
  E2E_STUDENT_B_EMAIL: ${{ secrets.E2E_STUDENT_B_EMAIL }}
  E2E_STUDENT_B_PASSWORD: ${{ secrets.E2E_STUDENT_B_PASSWORD }}

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lms_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @lms/api build

      - name: Run DB migrations
        run: pnpm --filter @lms/api db:migrate
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/lms_test

      - name: Seed test users
        run: pnpm --filter @lms/api db:seed:e2e-users
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/lms_test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Run E2E tests
        run: pnpm exec playwright test --project=recordings-api
        working-directory: tests/e2e
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/e2e/test-results/
            tests/e2e/playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Playwright trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces
          path: tests/e2e/test-results/**/*.zip
          retention-days: 14
